[build]
rustflags = [
  "-Dwarnings",
  "-Dunsafe_code",
  "-Cforce-frame-pointers=yes"
]

[alias]
# Security-focused lint pass used during scaffold hardening.
clippy-secure = "clippy --all-targets --all-features -- -D clippy::unwrap_used -D clippy::expect_used -D clippy::disallowed_methods -D clippy::panic -D clippy::todo -D clippy::unimplemented"

# Force heelonvault-core (référencé depuis premium via crates.io) à pointer
# sur la copie locale du workspace, pour éviter la duplication de traits.
[patch.crates-io]
heelonvault-core = { path = "crates/heelonvault-core" }

[patch."ssh://git@github.com/ppaperso/heelonvault-premium.git"]
heelonvault-premium = { path = "../heelonvault-premium" }
