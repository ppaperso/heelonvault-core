name: CI

# Governance:
# ┌──────────────────┬──────────────┬────────────────────┬──────────────────────────────┐
# │ Event            │ Tier 1       │ Tier 2/3           │ Tier 4+                      │
# ├──────────────────┼──────────────┼────────────────────┼──────────────────────────────┤
# │ pull_request     │ validate     │ fedora-dev (quick) │ —                            │
# │ push main/dev    │ validate     │ fedora-prod        │ sbom-check                   │
# │ push tag v*      │ validate     │ fedora + all 3     │ sbom + packaging + release   │
# │ workflow_dispatch│ validate     │ fedora + on-demand │ sbom                         │
# └──────────────────┴──────────────┴────────────────────┴──────────────────────────────┘
#
# On-demand platform builds: use "Run workflow" on GitHub and check the platform boxes.
# Cancel-in-progress: enabled for branches (not tags) — successive main pushes cancel old runs.

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_ubuntu:
        description: 'Build Linux/Ubuntu reference platform'
        type: boolean
        default: false
      build_macos:
        description: 'Build macOS (arm64)'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows (x86_64)'
        type: boolean
        default: false

# Cancel in-progress runs for branches; never cancel tag releases.
concurrency:
  group: ci-${{ github.ref }}-${{ github.event.pull_request.number || '' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  # ============================================================================
  # TIER 1: VALIDATION (Code Quality & Linting) — runs on every context
  # ============================================================================
  validate-source:
    name: Tier 1 • Validate source code quality
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies for validation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint – security and best practices
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

  # ============================================================================
  # TIER 2: PR FEEDBACK — lightweight Fedora compile check (PRs only)
  # ============================================================================
  build-fedora-dev:
    name: Tier 2 • Build on Fedora (PR check — no smoke tests)
    if: github.event_name == 'pull_request'
    needs: [validate-source]
    runs-on: ubuntu-24.04
    container: fedora:latest

    steps:
      - name: Install container bootstrap tools
        run: |
          dnf install -y \
            git \
            tar \
            gzip \
            coreutils \
            which

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Fedora build dependencies
        run: |
          dnf install -y \
            gcc \
            desktop-file-utils \
            pkgconf-pkg-config \
            gtk4-devel \
            libadwaita-devel \
            sqlite-devel \
            glib2-devel \
            glib2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

  # ============================================================================
  # TIER 3: BUILD MATRIX
  #   • Fedora (production) — every non-PR event (push main, tags, dispatch)
  #   • Ubuntu / macOS / Windows — tags and workflow_dispatch only
  # ============================================================================
  build-fedora-production:
    name: Tier 3 • Build Fedora (production target)
    if: github.event_name != 'pull_request'
    needs: [validate-source]
    runs-on: ubuntu-24.04
    container: fedora:latest

    steps:
      - name: Install container bootstrap tools
        run: |
          dnf install -y \
            git \
            tar \
            gzip \
            coreutils \
            which

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Fedora build dependencies
        run: |
          dnf install -y \
            gcc \
            desktop-file-utils \
            pkgconf-pkg-config \
            gtk4-devel \
            libadwaita-devel \
            sqlite-devel \
            glib2-devel \
            glib2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

      - name: Package distribution
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp target/release/heelonvault dist/
          for f in install.sh install-core.sh install-ubuntu.sh install-rhel.sh \
                   remove.sh remove-core.sh remove-ubuntu.sh remove-rhel.sh smoke-test.sh; do
            cp "scripts/$f" "dist/$f"
          done
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp docs/QUICKSTART.md dist/
          cp -r assets dist/
          (cd dist && sha256sum heelonvault > heelonvault.sha256)
          chmod +x dist/install.sh dist/install-ubuntu.sh dist/install-rhel.sh \
                    dist/remove.sh dist/remove-ubuntu.sh dist/remove-rhel.sh \
                    dist/heelonvault dist/smoke-test.sh

      - name: Smoke test – Fedora install
        run: ./dist/smoke-test.sh --install ./dist/install.sh

      - name: Smoke test – Fedora uninstall
        run: ./dist/smoke-test.sh --remove ./dist/remove.sh

      - name: Upload Fedora binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: fedora-binary
          path: target/release/heelonvault
          retention-days: 7

  build-linux-reference:
    name: Tier 3 • Build Linux (Ubuntu reference platform)
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_ubuntu == 'true')
    needs: [validate-source]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Build release binary
        run: cargo build --release --locked

      - name: Compile tests
        run: cargo test --locked --all-targets --no-run

      - name: Package distribution
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp target/release/heelonvault dist/
          for f in install.sh install-core.sh install-ubuntu.sh install-rhel.sh \
                   remove.sh remove-core.sh remove-ubuntu.sh remove-rhel.sh smoke-test.sh; do
            cp "scripts/$f" "dist/$f"
          done
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp docs/QUICKSTART.md dist/
          cp -r assets dist/
          (cd dist && sha256sum heelonvault > heelonvault.sha256)
          chmod +x dist/install.sh dist/install-ubuntu.sh dist/install-rhel.sh \
                    dist/remove.sh dist/remove-ubuntu.sh dist/remove-rhel.sh \
                    dist/heelonvault dist/smoke-test.sh

      - name: Smoke test – Ubuntu install
        run: ./dist/smoke-test.sh --install ./dist/install.sh

      - name: Smoke test – Ubuntu uninstall
        run: ./dist/smoke-test.sh --remove ./dist/remove.sh

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-binary
          path: target/release/heelonvault
          retention-days: 1

  build-macos:
    name: Tier 3 • Build macOS
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_macos == 'true')
    needs: [validate-source]
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install macOS build dependencies
        run: |
          brew update || true
          for formula in gtk4 libadwaita gdk-pixbuf sqlite pkgconf; do
            brew list "$formula" >/dev/null 2>&1 || (brew install "$formula" || brew install --no-quarantine "$formula")
          done
          # Homebrew installs Rust transitively (via glib/gobject-introspection).
          # Unlink it so its cargo/rustup-init do not shadow the toolchain below.
          brew unlink rust 2>/dev/null || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Verify Rust toolchain path
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          hash -r
          command -v cargo
          cargo --version
          rustup show active-toolchain

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate binary (static – no display server)
        run: |
          file target/release/heelonvault
          otool -L target/release/heelonvault

      - name: Upload macOS binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-binary
          path: target/release/heelonvault
          retention-days: 1

  build-windows:
    name: Tier 3 • Build Windows
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_windows == 'true')
    needs: [validate-source]
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2 and Windows build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-glib2

      - name: Verify MSYS2 toolchain
        run: |
          rustc --version
          cargo --version
          pkg-config --modversion gtk4
          pkg-config --modversion libadwaita-1

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify Windows release binary exists
        run: test -f target/release/heelonvault.exe

      - name: Report Windows release binary details
        run: |
          ls -lh target/release/heelonvault.exe
          sha256sum target/release/heelonvault.exe

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-binary
          path: target/release/heelonvault.exe
          retention-days: 1

  # ============================================================================
  # TIER 4: RELEASE GATES (Supply-chain & SBOM) — non-PR events
  #   Depends only on build-fedora-production (not the full platform matrix).
  # ============================================================================
  check-sbom:
    name: Tier 4 • Check SBOM is up-to-date
    if: github.event_name != 'pull_request'
    needs: [build-fedora-production]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx (pinned pre-compiled binary)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx@0.5.9
          fallback: none

      - name: Generate fresh SBOM
        run: |
          cargo cyclonedx \
            --format json \
            --spec-version 1.4 \
            --override-filename sbom-fresh
          mv sbom-fresh.json /tmp/sbom-fresh.json

      - name: Compare pURLs (order-insensitive, ignores volatile fields)
        run: |
          extract_purls() {
            jq -r '.components[]? | .purl // empty' "$1" | sort -u
          }

          COMMITTED=$(extract_purls sbom.cyclonedx.json)
          FRESH=$(extract_purls /tmp/sbom-fresh.json)

          if [ "$COMMITTED" != "$FRESH" ]; then
            echo "::error::sbom.cyclonedx.json is out of date."
            echo "::error::Run './scripts/generate-sbom.sh' and commit the result."
            echo ""
            echo "--- Diff (committed vs fresh) ---"
            diff <(echo "$COMMITTED") <(echo "$FRESH") || true
            exit 1
          fi

          COUNT=$(echo "$FRESH" | wc -l | tr -d ' ')
          echo "SBOM is up-to-date (${COUNT} pURLs matched)."

  # ============================================================================
  # TIER 5: RELEASE ARTIFACTS (Packaging & GitHub Release) — tags only
  # ============================================================================
  package-linux-tarball:
    name: Tier 5 • Package Linux tarball
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-fedora-production, check-sbom]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Fedora binary artifact
        uses: actions/download-artifact@v5
        with:
          name: fedora-binary
          path: ./binary

      - name: Prepare tarball contents
        run: |
          set -euo pipefail
          mkdir -p heelonvault-dist
          cp ./binary/heelonvault heelonvault-dist/
          for f in install.sh install-core.sh install-ubuntu.sh install-rhel.sh \
                   remove.sh remove-core.sh remove-ubuntu.sh remove-rhel.sh; do
            cp "scripts/$f" "heelonvault-dist/$f"
          done
          cp heelonvault.desktop heelonvault-dist/
          cp README.md heelonvault-dist/
          cp docs/QUICKSTART.md heelonvault-dist/
          cp -r assets heelonvault-dist/
          chmod +x heelonvault-dist/heelonvault heelonvault-dist/install.sh heelonvault-dist/remove.sh

      - name: Create tarball
        run: |
          tar czf heelonvault-linux-x86_64.tar.gz heelonvault-dist/
          sha256sum heelonvault-linux-x86_64.tar.gz > heelonvault-linux-x86_64.tar.gz.sha256
          cat heelonvault-linux-x86_64.tar.gz.sha256

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-tarball
          path: |
            heelonvault-linux-x86_64.tar.gz
            heelonvault-linux-x86_64.tar.gz.sha256
          retention-days: 5

  package-macos-dmg:
    name: Tier 5 • Package macOS DMG
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, check-sbom]
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS binary artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-binary
          path: ./binary

      - name: Install macOS packaging dependencies
        run: |
          brew install dylibbundler create-dmg || true

      - name: Create macOS DMG
        run: |
          bash scripts/create-macos-bundle.sh \
            --binary ./binary/heelonvault \
            --out heelonvault-macos-arm64.dmg

      - name: Generate SHA256
        run: |
          sha256sum heelonvault-macos-arm64.dmg > heelonvault-macos-arm64.dmg.sha256
          cat heelonvault-macos-arm64.dmg.sha256

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: |
            heelonvault-macos-arm64.dmg
            heelonvault-macos-arm64.dmg.sha256
          retention-days: 5

  package-windows-msi:
    name: Tier 5 • Package Windows MSI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, check-sbom]
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows binary artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-binary
          path: ./binary

      - name: Setup MSYS2 and packaging tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-imagemagick
            wix

      - name: Generate DLL dependency manifest
        run: |
          bash scripts/collect-dlls.sh \
            --binary ./binary/heelonvault.exe \
            --msys2 /mingw64 \
            --staging wix/staging \
            --out wix/dlls.wxs

      - name: Build MSI installer
        run: |
          wix build wix/main.wxs wix/dlls.wxs -o heelonvault-windows-x86_64.msi

      - name: Generate SHA256
        run: |
          sha256sum heelonvault-windows-x86_64.msi > heelonvault-windows-x86_64.msi.sha256
          cat heelonvault-windows-x86_64.msi.sha256

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-msi
          path: |
            heelonvault-windows-x86_64.msi
            heelonvault-windows-x86_64.msi.sha256
          retention-days: 5

  create-github-release:
    name: Tier 5 • Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - check-sbom
      - package-linux-tarball
      - package-macos-dmg
      - package-windows-msi
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts

      - name: Organize artifacts for release
        run: |
          mkdir -p release-assets
          cp artifacts/linux-tarball/* release-assets/ 2>/dev/null || true
          cp artifacts/macos-dmg/* release-assets/ 2>/dev/null || true
          cp artifacts/windows-msi/* release-assets/ 2>/dev/null || true
          cp sbom.cyclonedx.json release-assets/sbom.cyclonedx.json
          sha256sum release-assets/sbom.cyclonedx.json > release-assets/sbom.cyclonedx.json.sha256
          ls -lah release-assets/

      - name: Create GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ -[a-zA-Z] ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "HeelonVault $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
