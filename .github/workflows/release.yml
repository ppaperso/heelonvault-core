name: Release

# ⚠️  RELEASE TEMPORAIREMENT DÉSACTIVÉ — architecture core/premium en cours de stabilisation
# Pour réactiver, décommenter le bloc « on: » ci-dessous et supprimer le workflow_dispatch minimal.
#
# on:
#   push:
#     tags:
#       - "v*"
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Release désactivé — déclencher manuellement uniquement'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release-windows:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSYS2 and Windows build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-imagemagick
            python3

      - name: Build Windows release binary
        run: cargo build --release --locked

      - name: Collect DLLs, stage GLib resources and generate wix/dlls.wxs
        run: bash scripts/collect-dlls.sh --binary target/release/heelonvault.exe --msys2 /mingw64 --staging wix/staging --out wix/dlls.wxs

      - name: Install WiX toolset
        run: |
          DOTNET_EXE="/c/Program Files/dotnet/dotnet.exe"
          WIX_DIR="$(cygpath -u "$USERPROFILE")/.dotnet/tools"
          "$DOTNET_EXE" tool install --global wix
          cygpath -w "$WIX_DIR" >> "$GITHUB_PATH"

      - name: Build MSI
        run: |
          WIX_EXE="$(cygpath -u "$USERPROFILE")/.dotnet/tools/wix.exe"
          "$WIX_EXE" build -acceptEula wix7 -arch x64 wix/main.wxs wix/dlls.wxs -o heelonvault-windows-x86_64.msi

      - name: Smoke test – install MSI and verify startup
        run: |
          MSI_PATH="$(cygpath -w "$PWD/heelonvault-windows-x86_64.msi")"
          "/c/Windows/System32/msiexec.exe" //i "$MSI_PATH" //qn //norestart

          APP_PATH=""
          if [[ -x "/c/Program Files/HeelonVault/heelonvault.exe" ]]; then
            APP_PATH="/c/Program Files/HeelonVault/heelonvault.exe"
          elif [[ -x "/c/Program Files (x86)/HeelonVault/heelonvault.exe" ]]; then
            APP_PATH="/c/Program Files (x86)/HeelonVault/heelonvault.exe"
          fi

          if [[ -z "$APP_PATH" ]]; then
            echo "[ERROR] heelonvault.exe introuvable après installation MSI"
            ls -la "/c/Program Files" | head -100 || true
            ls -la "/c/Program Files (x86)" | head -100 || true
            exit 1
          fi

          "$APP_PATH" --startup-check

      - name: Compute MSI checksum
        run: sha256sum heelonvault-windows-x86_64.msi > heelonvault-windows-x86_64.msi.sha256

      - name: Generate MSI Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: heelonvault-windows-x86_64.msi

      - name: Publish Windows MSI to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GH_EXE=""
          if [[ -x "/c/Program Files/GitHub CLI/gh.exe" ]]; then
            GH_EXE="/c/Program Files/GitHub CLI/gh.exe"
          elif [[ -x "/c/hostedtoolcache/windows/gh/current/x64/bin/gh.exe" ]]; then
            GH_EXE="/c/hostedtoolcache/windows/gh/current/x64/bin/gh.exe"
          fi

          if [[ -z "$GH_EXE" ]]; then
            echo "[ERROR] GitHub CLI introuvable sur le runner Windows"
            exit 1
          fi

          GIT_DIR=""
          if [[ -x "/c/Program Files/Git/cmd/git.exe" ]]; then
            GIT_DIR="/c/Program Files/Git/cmd"
          elif [[ -x "/usr/bin/git" ]]; then
            GIT_DIR="/usr/bin"
          fi

          if [[ -n "$GIT_DIR" ]]; then
            export PATH="$GIT_DIR:$PATH"
          fi

          export GH_REPO="${GITHUB_REPOSITORY}"

          TAG="${GITHUB_REF_NAME}"
          ASSET="heelonvault-windows-x86_64.msi"
          CHECKSUM="${ASSET}.sha256"

          if "$GH_EXE" release view "$TAG" >/dev/null 2>&1; then
            "$GH_EXE" release upload "$TAG" "$ASSET" "$CHECKSUM" --clobber
          else
            "$GH_EXE" release create "$TAG" "$ASSET" "$CHECKSUM" --prerelease --generate-notes
          fi

  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies (GTK4/libadwaita/sqlite)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

      - name: Create release archive
        run: |
          rm -rf dist
          mkdir -p dist

          cp target/release/heelonvault dist/
          cp scripts/install.sh dist/install.sh
          cp scripts/install-core.sh dist/install-core.sh
          cp scripts/install-ubuntu.sh dist/install-ubuntu.sh
          cp scripts/install-rhel.sh dist/install-rhel.sh
          cp scripts/remove.sh dist/remove.sh
          cp scripts/remove-core.sh dist/remove-core.sh
          cp scripts/remove-ubuntu.sh dist/remove-ubuntu.sh
          cp scripts/remove-rhel.sh dist/remove-rhel.sh
          cp scripts/smoke-test.sh dist/smoke-test.sh
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp docs/QUICKSTART.md dist/
          cp -r assets dist/
          (cd dist && sha256sum heelonvault > heelonvault.sha256)

          chmod +x dist/install.sh dist/install-ubuntu.sh dist/install-rhel.sh dist/remove.sh dist/remove-ubuntu.sh dist/remove-rhel.sh dist/heelonvault dist/smoke-test.sh

      - name: Smoke test packaged installer
        run: |
          set -euo pipefail
          ./dist/smoke-test.sh --install ./dist/install.sh

      - name: Pack and Checksum
        run: |
          set -euo pipefail
          tar -C dist -czf heelonvault-linux-x86_64.tar.gz .
          sha256sum heelonvault-linux-x86_64.tar.gz > heelonvault-linux-x86_64.tar.gz.sha256

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: heelonvault-linux-x86_64.tar.gz

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="heelonvault-linux-x86_64.tar.gz"
          CHECKSUM="${ASSET}.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" "$CHECKSUM" --clobber
          else
            gh release create "$TAG" "$ASSET" "$CHECKSUM" --prerelease --generate-notes
          fi

  generate-sbom-artifact:
    name: Generate & publish SBOM
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx (pinned pre-compiled binary)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx@0.5.9
          fallback: none

      - name: Generate SBOM for release
        run: |
          cargo cyclonedx \
            --format json \
            --spec-version 1.4 \
            --override-filename sbom.cyclonedx
          echo "Components: $(jq '.components | length' sbom.cyclonedx.json)"

      - name: Compute SBOM checksum
        run: sha256sum sbom.cyclonedx.json > sbom.cyclonedx.json.sha256

      - name: Attest SBOM build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.cyclonedx.json

      - name: Publish SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --prerelease --generate-notes || true
          fi

          gh release upload "$TAG" \
            sbom.cyclonedx.json \
            sbom.cyclonedx.json.sha256 \
            --clobber

  build-and-release-macos:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install macOS build dependencies
        run: |
          for formula in gtk4 libadwaita gdk-pixbuf sqlite pkgconf dylibbundler create-dmg; do
            brew list "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build macOS release binary
        run: cargo build --release --locked

      - name: Create .app bundle and DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/create-macos-bundle.sh \
            --binary target/release/heelonvault \
            --version "${VERSION}" \
            --out heelonvault-macos-arm64.dmg

      - name: Smoke test – validate DMG structure
        run: |
          set -euo pipefail
          hdiutil attach heelonvault-macos-arm64.dmg -mountpoint /tmp/dmg_test -nobrowse -quiet

          test -x /tmp/dmg_test/HeelonVault.app/Contents/MacOS/heelonvault
          test -x /tmp/dmg_test/HeelonVault.app/Contents/MacOS/heelonvault-bin
          test -f /tmp/dmg_test/HeelonVault.app/Contents/Info.plist

          # Verify no unresolved external dylibs remain (all must be @rpath, /usr/lib or /System)
          UNEXPECTED=$(otool -L /tmp/dmg_test/HeelonVault.app/Contents/MacOS/heelonvault-bin \
            | tail -n +2 \
            | grep -v '@executable_path\|@rpath\|@loader_path\|/usr/lib\|/System/Library' || true)
          if [[ -n "$UNEXPECTED" ]]; then
            echo "[ERROR] Unresolved dylib references found:" >&2
            echo "${UNEXPECTED}" >&2
            hdiutil detach /tmp/dmg_test -quiet || true
            exit 1
          fi

          hdiutil detach /tmp/dmg_test -quiet

      - name: Compute DMG checksum
        run: shasum -a 256 heelonvault-macos-arm64.dmg > heelonvault-macos-arm64.dmg.sha256

      - name: Generate DMG Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: heelonvault-macos-arm64.dmg

      - name: Publish macOS DMG to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="heelonvault-macos-arm64.dmg"
          CHECKSUM="${ASSET}.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" "$CHECKSUM" --clobber
          else
            gh release create "$TAG" "$ASSET" "$CHECKSUM" --prerelease --generate-notes
          fi
