name: supply-chain

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
  schedule:
    # Runs on default branch only — PREMIUM_SSH_KEY available via repo secrets.
    # Daily at 07:00 UTC — catches new advisories published overnight.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny supply-chain gate
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. cargo-deny check ────────────────────────────────────────────────
      # Checks: advisories (CVE/yanked), licenses, bans, sources
      # Pinned to exact version — a floating @v2 tag on a security gate
      # would be ironic. Update intentionally when new versions are available.
      #
      # SSH note: cargo-deny-action runs inside a Docker container. The host
      # ssh-agent socket (SSH_AUTH_SOCK) is passed as an env var but the socket
      # file is NOT volume-mounted → git inside the container cannot reach it.
      # Use the action's native ssh-key + use-git-cli inputs instead: the
      # action writes the key inside the container and sets git-fetch-with-cli,
      # which is the only reliable path for private SSH git dependencies.
      #
      # Closes: #28, #40
      - name: Run cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2.0.20
        with:
          command: check
          arguments: --all-features
          log-level: warn
          manifest-path: Cargo.toml
          ssh-key: ${{ secrets.PREMIUM_SSH_KEY }}
          use-git-cli: "true"
