name: supply-chain

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
  schedule:
    # Runs on default branch only — PREMIUM_SSH_KEY available via repo secrets.
    # Daily at 07:00 UTC — catches new advisories published overnight.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny supply-chain gate
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. SSH agent pour le repo premium privé ────────────────────────────
      # cargo-deny-action calls `cargo metadata` internally to build the
      # dependency graph. Without SSH credentials, it fails to resolve
      # heelonvault-premium (referenced via SSH in the workspace).
      - name: Setup SSH agent (heelonvault-premium)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PREMIUM_SSH_KEY }}

      # ── 3. Patch .cargo/config.toml pour le CI ─────────────────────────────
      # cargo metadata requires git-fetch-with-cli=true so it uses the
      # ssh-agent rather than libgit2 (which ignores the agent in CI).
      # Minimal patch only — no need to remove [patch.ssh://] sections here
      # since cargo-deny does not compile.
      - name: Patch .cargo/config.toml for CI
        run: |
          set -euo pipefail
          grep -q "git-fetch-with-cli" .cargo/config.toml \
            || printf '\n[net]\ngit-fetch-with-cli = true\n' >> .cargo/config.toml
          echo "[OK] .cargo/config.toml patched"

      # ── 4. cargo-deny check ────────────────────────────────────────────────
      # Checks: advisories (CVE/yanked), licenses, bans, sources
      # Pinned to exact version — a floating @v2 tag on a security gate
      # would be ironic. Update intentionally when new versions are available.
      # Closes: #28, #40
      - name: Run cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2.0.20
        with:
          command: check
          arguments: --all-features
          log-level: warn
          manifest-path: Cargo.toml
