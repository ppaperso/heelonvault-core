name: windows-msi-rc

on:
  push:
    tags:
      - "v*.*.*-rc.*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA). Empty = current default ref"
        required: false
        type: string
      rc_tag:
        description: "RC tag to build/release (ex: v1.1.1-rc.1). Empty = current ref checkout"
        required: false
        type: string
      publish_release:
        description: "Publish/Update GitHub Release with MSI + SHA256"
        required: true
        default: false
        type: boolean

concurrency:
  group: windows-msi-rc-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TARGET: x86_64-pc-windows-gnu
  APP_PACKAGE: heelonvault-app
  APP_EXE_NAME: heelonvault.exe
  ARTIFACT_PREFIX: heelonvault-windows-x86_64

jobs:
  package-windows-msi:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref != '' && inputs.source_ref || github.event_name == 'workflow_dispatch' && inputs.rc_tag != '' && inputs.rc_tag || github.ref }}

      # ── Early SSH gate ─────────────────────────────────────────────────
      # Must run BEFORE Rust cache and MSYS2 to fail fast (saves 5-10 min).
      # Shell: pwsh (Windows native). No MSYS2 involved here.
      - name: Validate SSH access (heelonvault-premium)
        shell: pwsh
        env:
          PREMIUM_SSH_KEY: ${{ secrets.PREMIUM_SSH_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sshKeyPath    = Join-Path $env:RUNNER_TEMP 'premium_ssh_key'
          $knownHostsPath = Join-Path $env:RUNNER_TEMP 'known_hosts'

          if ([string]::IsNullOrWhiteSpace($env:PREMIUM_SSH_KEY)) {
            throw '[ERROR] PREMIUM_SSH_KEY secret is empty — check repository secret settings'
          }

          # Write key as raw ASCII bytes with Unix LF only.
          # WriteAllText / Set-Content can corrupt binary-sensitive files on Windows.
          $keyText = $env:PREMIUM_SSH_KEY -replace "`r`n", "`n" -replace "`r", "`n"
          if (-not $keyText.EndsWith("`n")) { $keyText += "`n" }
          $keyBytes = [System.Text.Encoding]::ASCII.GetBytes($keyText)
          [System.IO.File]::WriteAllBytes($sshKeyPath, $keyBytes)

          # Set strict ACL via .NET (avoids icacls locale/identity quirks).
          $acl = Get-Acl $sshKeyPath
          $acl.SetAccessRuleProtection($true, $false)
          $identity = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          $rule = New-Object System.Security.AccessControl.FileSystemAccessRule(
            $identity, 'Read', 'Allow')
          $acl.AddAccessRule($rule)
          Set-Acl $sshKeyPath $acl
          Write-Host "[OK] Key written to: $sshKeyPath ($(($keyBytes.Length)) bytes, identity: $identity)"

          # Populate known_hosts for github.com.
          ssh-keyscan github.com 2>$null | Out-File -FilePath $knownHostsPath -Encoding ascii

          # Quick SSH handshake (exit 1 = authenticated but no shell = success for a deploy key).
          ssh -T git@github.com `
            -i $sshKeyPath `
            -o IdentitiesOnly=yes `
            -o StrictHostKeyChecking=yes `
            -o UserKnownHostsFile=$knownHostsPath `
            -o BatchMode=yes 2>&1 | ForEach-Object { Write-Host "[SSH] $_" }
          # ssh -T returns 1 on success (no PTY) and 255 on auth failure.
          if ($LASTEXITCODE -eq 255) {
            throw '[ERROR] SSH authentication to github.com failed — verify PREMIUM_SSH_KEY matches the deploy key on heelonvault-premium'
          }
          Write-Host '[OK] SSH handshake to github.com succeeded'

          # Full git ls-remote to confirm repo access.
          $env:GIT_SSH_COMMAND = "ssh -i `"$sshKeyPath`" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=`"$knownHostsPath`""
          git ls-remote ssh://git@github.com/ppaperso/heelonvault-premium.git HEAD
          if ($LASTEXITCODE -ne 0) {
            throw '[ERROR] git ls-remote failed — deploy key may lack read access to heelonvault-premium'
          }
          Write-Host '[OK] SSH access to heelonvault-premium confirmed'

      # ── Rust cache (after SSH gate, before long MSYS2 install) ────────────
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-msi-rc-${{ env.RUST_TARGET }}
          save-if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          location: C:\msys64
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-imagemagick
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-graphene
            mingw-w64-x86_64-libepoxy
            mingw-w64-x86_64-libadwaita
            python3

      - name: Build package, MSI and SHA256
        id: build
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_RC_TAG: ${{ inputs.rc_tag }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          $ErrorActionPreference = 'Stop'
          $root           = (Get-Location).Path
          $cargoConfigPath = Join-Path $root '.cargo/config.toml'
          $coreLocalesPath = Join-Path $root 'crates/heelonvault-core/locales'
          $rootLocalesPath = Join-Path $root 'locales'
          $msysBash        = 'C:\msys64\usr\bin\bash.exe'
          # Key paths set by the early "Validate SSH access" step.
          $sshKeyPath     = Join-Path $env:RUNNER_TEMP 'premium_ssh_key'
          $knownHostsPath = Join-Path $env:RUNNER_TEMP 'known_hosts'

          function Assert-File([string] $path, [string] $message) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "[ERROR] $message ($path)"
            }
          }

          function Assert-Directory([string] $path, [string] $message) {
            if (-not (Test-Path $path -PathType Container)) {
              throw "[ERROR] $message ($path)"
            }
          }

          function Invoke-Msys([string] $script, [string] $label) {
            Write-Host "[MSYS2] $label"
            & $msysBash -lc "set -euo pipefail; cd '$(($root -replace '\\','/'))'; $script"
            if ($LASTEXITCODE -ne 0) {
              throw "[ERROR] MSYS2 step failed: $label"
            }
          }

          # SSH key written by "Validate SSH access" step into RUNNER_TEMP.
          # Reuse same path here to configure GIT_SSH_COMMAND for cargo build.
          $env:GIT_SSH_COMMAND = "ssh -i `"$sshKeyPath`" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=`"$knownHostsPath`""
          Write-Host '[OK] GIT_SSH_COMMAND set for cargo build'

          Assert-File (Join-Path $root 'Cargo.toml') 'Cargo.toml not found'
          Assert-File (Join-Path $root 'wix/main.wxs') 'wix/main.wxs not found'
          Assert-File (Join-Path $root 'scripts/collect-dlls.sh') 'scripts/collect-dlls.sh not found'
          Assert-Directory (Join-Path $root 'migrations') 'migrations directory not found'
          Assert-Directory $rootLocalesPath 'locales directory not found at repository root'

          if (-not (Test-Path $cargoConfigPath -PathType Leaf)) {
            throw '[ERROR] .cargo/config.toml not found'
          }

          $cargoConfig = Get-Content $cargoConfigPath -Raw
          $cargoConfig = [regex]::Replace($cargoConfig, '(?ms)^\[net\]\s*git-fetch-with-cli\s*=\s*true\s*$', '')
          $cargoConfig = $cargoConfig.TrimEnd()
          $cargoConfig = "$cargoConfig`n`n[net]`ngit-fetch-with-cli = true`n"
          Set-Content -Path $cargoConfigPath -Value $cargoConfig -NoNewline
          Write-Host '[OK] .cargo/config.toml patched with net.git-fetch-with-cli = true'

          if (Test-Path $coreLocalesPath) {
            Remove-Item -Path $coreLocalesPath -Force -Recurse
          }
          New-Item -ItemType Junction -Path $coreLocalesPath -Target $rootLocalesPath | Out-Null
          Assert-Directory $coreLocalesPath 'Failed to create locales junction'
          Write-Host '[OK] locales junction ready for Windows build context'

          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          rustup default stable-x86_64-pc-windows-gnu
          rustup target add $env:RUST_TARGET
          rustup show

          $env:PATH = "C:\Program Files\Git\bin;C:\Users\runneradmin\.cargo\bin;C:\msys64\mingw64\bin;$env:PATH"
          $env:PKG_CONFIG_PATH = 'C:\msys64\mingw64\lib\pkgconfig'

          cargo build --release --locked --target $env:RUST_TARGET -p $env:APP_PACKAGE
          $exePath = Join-Path $root "target/$($env:RUST_TARGET)/release/$($env:APP_EXE_NAME)"
          Assert-File $exePath 'Application executable not produced'
          Write-Host "[OK] Built executable: $exePath"

          $stagingMigrationsDir = Join-Path $root 'wix/staging/migrations'
          New-Item -ItemType Directory -Force -Path $stagingMigrationsDir | Out-Null
          Copy-Item -Path (Join-Path $root 'migrations/*.sql') -Destination $stagingMigrationsDir -Force
          $migrationCount = (Get-ChildItem -Path $stagingMigrationsDir -Filter '*.sql' -File | Measure-Object).Count
          if ($migrationCount -lt 1) {
            throw '[ERROR] No migrations staged for MSI packaging'
          }
          Write-Host "[OK] Staged $migrationCount migration files"

          Invoke-Msys "bash scripts/collect-dlls.sh --binary target/$env:RUST_TARGET/release/$env:APP_EXE_NAME --msys2 /mingw64 --staging wix/staging --out wix/dlls.wxs" 'Collect DLLs and generate wix/dlls.wxs'

          Assert-File (Join-Path $root 'wix/dlls.wxs') 'wix/dlls.wxs not generated'
          Assert-File (Join-Path $root 'wix/staging/heelonvault.ico') 'wix/staging/heelonvault.ico missing'
          Assert-File (Join-Path $root 'wix/staging/share/glib-2.0/schemas/gschemas.compiled') 'gschemas.compiled missing'
          Assert-File (Join-Path $root 'wix/staging/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache') 'loaders.cache missing'

          dotnet tool update --global wix
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global wix
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix --version
          wix eula accept wix7

          $cargoToml = Get-Content (Join-Path $root 'crates/heelonvault-app/Cargo.toml') -Raw
          $versionMatch = [regex]::Match($cargoToml, '(?m)^\s*version\s*=\s*"([^"]+)"\s*$')
          if (-not $versionMatch.Success) {
            throw '[ERROR] Failed to read version from crates/heelonvault-app/Cargo.toml'
          }
          $appVersionRaw = $versionMatch.Groups[1].Value
          $appVersionMsi = $appVersionRaw -replace '-.*$', ''
          if ($appVersionMsi -notmatch '^\d+\.\d+\.\d+$') {
            throw "[ERROR] Invalid MSI version derived from Cargo.toml: $appVersionMsi"
          }

          $shouldPublish = if ($env:EVENT_NAME -eq 'push') {
            'true'
          } elseif ($env:INPUT_PUBLISH_RELEASE -eq 'true') {
            'true'
          } else {
            'false'
          }

          $releaseTag = if ($env:EVENT_NAME -eq 'push') {
            $env:GITHUB_REF_NAME
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_RC_TAG)) {
            $env:INPUT_RC_TAG
          } else {
            ''
          }

          if ($shouldPublish -eq 'true' -and $releaseTag -notmatch '^v\d+\.\d+\.\d+-rc\.\d+$') {
            throw "[ERROR] Invalid RC tag format for publish mode: $releaseTag"
          }

          $artifactLabel = if (-not [string]::IsNullOrWhiteSpace($releaseTag)) {
            $releaseTag
          } else {
            "test-$($env:GITHUB_SHA.Substring(0,8))"
          }

          $msiName = "$($env:ARTIFACT_PREFIX)-$artifactLabel.msi"
          $shaName = "$msiName.sha256"

          wix build `
            wix/main.wxs `
            wix/dlls.wxs `
            -d ProductVersion=$appVersionMsi `
            -o $msiName

          Assert-File (Join-Path $root $msiName) 'MSI not produced'

          $hash = (Get-FileHash $msiName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash $msiName" | Out-File -FilePath $shaName -Encoding ASCII -NoNewline
          Assert-File (Join-Path $root $shaName) 'SHA256 file not produced'

          # Smoke test: silent install + presence checks + binary version
          $installLog = Join-Path $root 'msi-install.log'
          $installPath64 = 'C:\Program Files\HeelonVault'
          $installPath32 = 'C:\Program Files (x86)\HeelonVault'
          $msiFullPath = Join-Path $root $msiName

          $installProc = Start-Process msiexec.exe -ArgumentList '/i', $msiFullPath, '/qn', '/norestart', '/l*v', $installLog -Wait -NoNewWindow -PassThru
          if ($installProc.ExitCode -ne 0) {
            throw "[ERROR] MSI install failed with exit code $($installProc.ExitCode)"
          }

          $installPath = if (Test-Path $installPath64 -PathType Container) {
            $installPath64
          } elseif (Test-Path $installPath32 -PathType Container) {
            $installPath32
          } else {
            throw '[ERROR] Installation folder not found in Program Files or Program Files (x86)'
          }

          Assert-File (Join-Path $installPath $env:APP_EXE_NAME) 'Installed executable missing after MSI install'
          Assert-Directory (Join-Path $installPath 'migrations') 'Installed migrations directory missing'
          Assert-File (Join-Path $installPath 'migrations/0001_init_schema.sql') 'First migration missing in installation'
          Assert-File (Join-Path $installPath 'share/glib-2.0/schemas/gschemas.compiled') 'Installed gschemas.compiled missing'
          Assert-File (Join-Path $installPath 'lib/gdk-pixbuf-2.0/2.10.0/loaders.cache') 'Installed loaders.cache missing'

          & (Join-Path $installPath $env:APP_EXE_NAME) --version
          if ($LASTEXITCODE -ne 0) {
            throw "[ERROR] Installed executable --version failed with exit code $LASTEXITCODE"
          }

          $uninstallProc = Start-Process msiexec.exe -ArgumentList '/x', $msiFullPath, '/qn', '/norestart' -Wait -NoNewWindow -PassThru
          if ($uninstallProc.ExitCode -ne 0) {
            throw "[ERROR] MSI uninstall failed with exit code $($uninstallProc.ExitCode)"
          }

          "msi_name=$msiName" >> $env:GITHUB_OUTPUT
          "sha_name=$shaName" >> $env:GITHUB_OUTPUT
          "tag_name=$releaseTag" >> $env:GITHUB_OUTPUT
          "should_publish=$shouldPublish" >> $env:GITHUB_OUTPUT
          "app_version_raw=$appVersionRaw" >> $env:GITHUB_OUTPUT
          "app_version_msi=$appVersionMsi" >> $env:GITHUB_OUTPUT

          Write-Host "[OK] Build complete: $msiName"
          Write-Host "[OK] SHA256 generated: $shaName"
          Write-Host "[OK] Version raw=$appVersionRaw, MSI=$appVersionMsi"

          Remove-Item -Path $sshKeyPath -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $knownHostsPath -Force -ErrorAction SilentlyContinue

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: heelonvault-windows-msi
          if-no-files-found: error
          path: |
            ${{ steps.build.outputs.msi_name }}
            ${{ steps.build.outputs.sha_name }}

      - name: Publish/Update GitHub Release (RC)
        if: steps.build.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ steps.build.outputs.tag_name }}'
          $msi = '${{ steps.build.outputs.msi_name }}'
          $sha = '${{ steps.build.outputs.sha_name }}'

          if (-not ($tag -match '^v\d+\.\d+\.\d+-rc\.\d+$')) {
            throw "[ERROR] Invalid RC tag format: $tag"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title $tag `
              --prerelease `
              --notes "Automated Windows RC packaging artifact."
            if ($LASTEXITCODE -ne 0) {
              throw "[ERROR] Failed to create release $tag"
            }
            Write-Host "[OK] Release created: $tag"
          } else {
            Write-Host "[OK] Release already exists: $tag"
          }

          gh release upload $tag $msi $sha --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "[ERROR] Failed to upload release artifacts for $tag"
          }
          Write-Host "[OK] Artifacts uploaded to release: $tag"
