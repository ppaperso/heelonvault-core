name: windows-msi-rc

on:
  push:
    tags:
      - "v*.*.*-rc.*"
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to build/release (ex: v1.1.1-rc.1). Empty = current ref checkout"
        required: false
        type: string
      publish_release:
        description: "Publish/Update GitHub Release with MSI + SHA256"
        required: true
        default: false
        type: boolean

concurrency:
  group: windows-msi-rc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-windows-msi:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.rc_tag != '' && inputs.rc_tag || github.ref }}

      - name: Setup SSH agent (heelonvault-premium)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PREMIUM_SSH_KEY }}

      - name: Patch .cargo/config.toml for CI
        shell: pwsh
        run: |
          $config = Get-Content .cargo/config.toml -Raw
          $config = $config -replace '(?s)\[patch\."ssh://[^"]+"\][^\[]*', ''
          $config += "`n[net]`ngit-fetch-with-cli = true`n"
          Set-Content .cargo/config.toml $config
          Write-Host "[OK] .cargo/config.toml patched for CI"

      - name: Validate repository root layout
        shell: bash
        run: |
          set -euo pipefail
          test -f Cargo.toml                                          || { echo "[ERROR] Cargo.toml not found"; exit 1; }
          test -f wix/main.wxs                                        || { echo "[ERROR] wix/main.wxs not found"; exit 1; }
          test -f scripts/collect-dlls.sh                             || { echo "[ERROR] collect-dlls.sh not found"; exit 1; }
          echo "[OK] Repository layout validated"

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-imagemagick
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-graphene
            mingw-w64-x86_64-libepoxy
            python3

      - name: Add MSYS2 binaries to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin"     | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Write-Host "[OK] PATH entries added"

          Write-Host "=== mingw64 ==="
          Get-ChildItem C:\msys64\mingw64\bin\pkg* -ErrorAction SilentlyContinue

          Write-Host "=== usr ==="
          Get-ChildItem C:\msys64\usr\bin\pkg* -ErrorAction SilentlyContinue

      - name: Setup Rust toolchain
        shell: bash
        run: |
          rustup target add x86_64-pc-windows-gnu
          rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test SSH access to heelonvault-premium
        shell: bash
        run: |
          set -euo pipefail

          echo "HOME=$HOME"
          echo "RUNNER_TEMP=$RUNNER_TEMP"

          KEY_FILE="$RUNNER_TEMP/premium_key"

          echo "${{ secrets.PREMIUM_SSH_KEY }}" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          SSH_OUTPUT=$(ssh -T git@github.com -i "$KEY_FILE" -o StrictHostKeyChecking=no 2>&1 || true)

          if [[ "$SSH_OUTPUT" == *"successfully authenticated"* ]]; then
            echo "[OK] SSH access to GitHub verified"
          else
            echo "[ERROR] SSH access failed: $SSH_OUTPUT"
            exit 1
          fi

          git clone --depth 1 git@github.com:ppaperso/heelonvault-premium.git /tmp/test_premium || {
            echo "[ERROR] Failed to clone heelonvault-premium"
            exit 1
          }

          rm -rf /tmp/test_premium
          rm -f "$KEY_FILE"

          echo "[OK] SSH access to heelonvault-premium verified"

      - name: Verify pkg-config before cargo
        shell: pwsh
        run: |
          Write-Host "=== WHERE ==="
          where.exe pkg-config
          where.exe pkgconf

          Write-Host ""
          Write-Host "=== ENV ==="
          Write-Host "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          Write-Host "PKG_CONFIG_LIBDIR=$env:PKG_CONFIG_LIBDIR"

          Write-Host ""
          Write-Host "=== EXE EXISTS ==="
          Test-Path "C:\msys64\mingw64\bin\pkg-config.exe"
          Test-Path "C:\msys64\mingw64\bin\pkgconf.exe"

          Write-Host ""
          Write-Host "=== VERSION ==="
          & "C:\msys64\mingw64\bin\pkg-config.exe" --version

          Write-Host ""
          Write-Host "=== GLIB ==="
          & "C:\msys64\mingw64\bin\pkg-config.exe" --modversion glib-2.0

          Write-Host ""
          Write-Host "=== GTK4 ==="
          & "C:\msys64\mingw64\bin\pkg-config.exe" --modversion gtk4

      - name: Build heelonvault-app (locked)
        shell: bash
        run: |
          set -euo pipefail

          KEY_FILE="$RUNNER_TEMP/premium_key"

          echo "${{ secrets.PREMIUM_SSH_KEY }}" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test -f "$KEY_FILE" || { echo "[ERROR] premium_key not created"; exit 1; }

          export GIT_SSH_COMMAND="ssh -i $KEY_FILE -o StrictHostKeyChecking=no"

          export PATH="/c/msys64/mingw64/bin:$PATH"
          export PKG_CONFIG_PATH="/c/msys64/mingw64/lib/pkgconfig:/c/msys64/mingw64/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="/c/msys64/mingw64/lib/pkgconfig:/c/msys64/mingw64/share/pkgconfig"
          export PKG_CONFIG_ALLOW_CROSS=1

          cargo build --release --locked --target x86_64-pc-windows-gnu -p heelonvault-app

          rm -f "$KEY_FILE"

          test -f target/x86_64-pc-windows-gnu/release/heelonvault.exe || {
            echo "[ERROR] heelonvault.exe not produced"
            exit 1
          }

          echo "[OK] heelonvault.exe built"

      - name: Collect DLLs and generate wix/dlls.wxs
        shell: msys2 {0}
        run: |
          set -euo pipefail
          bash scripts/collect-dlls.sh \
            --binary   target/x86_64-pc-windows-gnu/release/heelonvault.exe \
            --msys2    /mingw64 \
            --staging  wix/staging \
            --out      wix/dlls.wxs

          test -f wix/dlls.wxs \
            || { echo "[ERROR] dlls.wxs not generated"; exit 1; }
          test -f wix/staging/heelonvault.ico \
            || { echo "[ERROR] heelonvault.ico missing — check assets/icons path"; exit 1; }
          test -s wix/staging/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache \
            || { echo "[ERROR] loaders.cache missing or empty"; exit 1; }
          echo "[OK] DLLs collected, dlls.wxs generated"

      - name: Install WiX v4
        shell: pwsh
        run: |
          $installed = dotnet tool list --global | Select-String "wix"
          if (-not $installed) {
            dotnet tool install --global wix
          } else {
            Write-Host "[OK] WiX already installed: $installed"
          }
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI with WiX
        shell: pwsh
        run: |
          wix --version
          wix build `
            wix/main.wxs `
            wix/dlls.wxs `
            -o heelonvault-windows-x86_64.msi
          if (-not (Test-Path heelonvault-windows-x86_64.msi)) {
            throw "[ERROR] MSI not produced"
          }
          Write-Host "[OK] MSI built: $((Get-Item heelonvault-windows-x86_64.msi).Length) bytes"

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash heelonvault-windows-x86_64.msi -Algorithm SHA256).Hash
          "$hash heelonvault-windows-x86_64.msi" | Out-File -FilePath heelonvault-windows-x86_64.msi.sha256 -Encoding ASCII -NoNewline
          Write-Host "[OK] SHA256: $hash"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: heelonvault-windows-msi
          if-no-files-found: error
          path: |
            heelonvault-windows-x86_64.msi
            heelonvault-windows-x86_64.msi.sha256

      - name: Resolve release tag and mode
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            SHOULD_PUBLISH="true"
          else
            TAG_NAME="${{ inputs.rc_tag }}"
            SHOULD_PUBLISH="${{ inputs.publish_release }}"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"

      - name: Validate RC tag format before publish
        if: steps.release_meta.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          [[ -n "$TAG" ]] || { echo "[ERROR] publish_release=true requires a tag"; exit 1; }
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]] || {
            echo "[ERROR] Invalid RC tag format: $TAG"
            echo "Expected: vX.Y.Z-rc.N"
            exit 1
          }
          echo "[OK] Tag format valid: $TAG"

      - name: Publish/Update GitHub Release (RC)
        if: steps.release_meta.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag_name }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --prerelease \
              --notes "Automated Windows RC packaging artifact."
            echo "[OK] Release created: $TAG"
          else
            echo "[OK] Release already exists: $TAG — uploading artifacts"
          fi

          gh release upload "$TAG" \
            heelonvault-windows-x86_64.msi \
            heelonvault-windows-x86_64.msi.sha256 \
            --clobber
          echo "[OK] Artifacts uploaded to release $TAG"                    