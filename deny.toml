# Configuration de cargo-deny pour la sécurité de la supply-chain
# Documentation: https://embarkstudios.github.io/cargo-deny/
# Issues: #28, #40 - enforce supply-chain policy in CI

[advisories]
# Bloc toutes les vulnérabilités connues (CVE) — zéro tolérance
version = 2
yanked = "deny"
# Only error on unmaintained advisories for direct workspace deps.
# Using "all" would also flag unmaintained transitive deps of third-party
# crates (heelonvault-premium included) and cause false positives on RUSTSEC
# entries we cannot control. Re-evaluate if a direct dep becomes unmaintained.
unmaintained = "workspace"

[licenses]
# Politique de licences : autoriser uniquement les licences permissives approuvées
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",              # option-ext
  "CDLA-Permissive-2.0",  # webpki-roots
]

[bans]
# Approche zero-debt : "deny" + skip explicites.
# Toute nouvelle duplicate non documentée fait échouer le build.
# Les 20 exceptions ci-dessous ont été revues et acceptées — mettre à jour
# lorsque les crates upstream alignent leurs séries de versions.
multiple-versions = "deny"
skip = [
  # fluent-templates 0.9 est encore sur flume 0.11 ; sqlx 0.9 est sur 0.12
  { name = "flume",             reason = "fluent-templates 0.9 → 0.11, sqlx 0.9 → 0.12 ; migration upstream en attente" },
  # trois séries semver-incompatibles coexistent : ring/argon2 → 0.2, rand → 0.3, uuid/tempfile → 0.4
  { name = "getrandom",         reason = "ring/argon2 sur 0.2 ; rand sur 0.3 ; uuid/tempfile sur 0.4 — séries incompatibles" },
  # hashbrown : split de version dans l'écosystème indexmap/hashbrown
  { name = "hashbrown",         reason = "split de version dans l'écosystème indexmap/hashbrown" },
  # r-efi : support cible Windows UEFI, split dans l'écosystème winapi
  { name = "r-efi",             reason = "split de version dans l'écosystème winapi/Windows cibles" },
  # rand 0.8 utilise rand_core 0.6 ; rand 0.9 utilise rand_core 0.9
  { name = "rand_core",         reason = "rand 0.8 → rand_core 0.6 ; rand 0.9 → rand_core 0.9 — migration en cours" },
  # lié au split hashbrown
  { name = "rustc-hash",        reason = "split lié à hashbrown dans l'écosystème" },
  # heelonvault-app et heelonvault-core déclarent des feature sets différents → deux entrées lock
  { name = "sqlx",              reason = "deux crates workspace utilisent des features sqlx 0.9 différentes → deux entrées lock" },
  # proc-macros fluent-templates encore sur syn 1.x ; sqlx/autres sur syn 2.x
  { name = "syn",               reason = "fluent-templates proc-macros → syn 1.x ; sqlx/autres → syn 2.x" },
  # sqlx 0.9 dépend encore de thiserror 1.x ; crates plus récentes sur 2.x
  { name = "thiserror",         reason = "sqlx 0.9 → thiserror 1.x ; autres crates → 2.x" },
  { name = "thiserror-impl",    reason = "pairé avec le split thiserror 1.x/2.x" },
  # windows-sys + sous-crates : split des bindings Windows SDK entre ring/rustls et les autres
  { name = "windows-sys",              reason = "ring/rustls sur une version Windows SDK ; reste de l'écosystème sur une autre" },
  { name = "windows-targets",          reason = "pairé avec le split windows-sys" },
  { name = "windows_aarch64_gnullvm",  reason = "pairé avec le split windows-sys" },
  { name = "windows_aarch64_msvc",     reason = "pairé avec le split windows-sys" },
  { name = "windows_i686_gnu",         reason = "pairé avec le split windows-sys" },
  { name = "windows_i686_msvc",        reason = "pairé avec le split windows-sys" },
  { name = "windows_x86_64_gnu",       reason = "pairé avec le split windows-sys" },
  { name = "windows_x86_64_gnullvm",   reason = "pairé avec le split windows-sys" },
  { name = "windows_x86_64_msvc",      reason = "pairé avec le split windows-sys" },
  # getrandom 0.3 → wasip2 ; getrandom 0.4 → wasip3 (deux séries WASI actives)
  { name = "wit-bindgen",       reason = "getrandom 0.3 → wit-bindgen wasip2 ; 0.4 → wasip3" },
]

[sources]
# Autoriser uniquement crates.io et le repo premium privé (pas de sources inconnues)
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# heelonvault-premium : dépendance privée SSH, seul repo git autorisé
allow-git = ["ssh://git@github.com/ppaperso/heelonvault-premium.git"]
