# Configuration de cargo-deny pour la sécurité de la supply-chain
# Documentation: https://embarkstudios.github.io/cargo-deny/
# Issues: #28, #40 - enforce supply-chain policy in CI

[advisories]
# Bloc toutes les vulnérabilités connues (CVE) — zéro tolérance
version = 2
yanked = "deny"

[licenses]
# Politique de licences : autoriser uniquement les licences permissives approuvées
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",              # option-ext
  "CDLA-Permissive-2.0",  # webpki-roots
]

[bans]
# Interdire les versions multiples d'une même crate (sauf exceptions justifiées)
multiple-versions = "warn"

[sources]
# Autoriser uniquement crates.io et git (pas de sources inconnues)
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
